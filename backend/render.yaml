services:
  - type: web
    name: sauce-market-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: sauce-market-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: APP_URL
        sync: false
      - key: SUBSCRIPTION_MONTHLY_FCFA
        value: "1000"
      - key: COMMISSION_RATE
        value: "0.05"

databases:
  - name: sauce-market-db
    plan: free
    databaseName: sauce_market
    user: sauce_market
